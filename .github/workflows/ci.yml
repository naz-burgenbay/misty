name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_LOGIN_SERVER: acrmistydev.azurecr.io
  IMAGE_NAME: misty-api
  APP_SERVICE_NAME: app-misty-dev
  RESOURCE_GROUP: rg-misty-dev

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore Misty.slnx

      - name: Build
        run: dotnet build Misty.slnx --no-restore -c Release

      - name: Test
        run: dotnet test Misty.slnx --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results.trx"

  push-and-deploy:
    name: Push & Deploy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name acrmistydev

      - name: Build & push Docker image
        run: |
          IMAGE_TAG=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          IMAGE_LATEST=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          docker build -t "$IMAGE_TAG" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"

      - name: Deploy to App Service
        run: |
          az webapp config container set \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --container-image-name ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Restart App Service
        run: |
          az webapp restart \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}

      - name: Wait for health check
        run: |
          echo "Waiting 60s for app to start..."
          sleep 60
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.APP_SERVICE_NAME }}.azurewebsites.net/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
